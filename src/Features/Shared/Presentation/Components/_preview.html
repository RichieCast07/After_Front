<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="../../../../index.css" />
  <link rel="stylesheet" href="./dashboard-shell.css" />
  <title>Preview cards</title>
  <style> body { padding: 24px; } .wrap { max-width: 900px; margin: 0 auto; } h4 { color: #7fcbff; margin: 18px 0 8px; } </style>
</head>
<body>
  <div class="wrap">
    <h4>Equipo — nuevo layout</h4>
    <div class="collection-list">
      <!-- RP activo -->
      <article class="collection-card list-card">
        <div class="list-card-info">
          <h3>Miguel Márquez</h3>
          <p>@miguel</p>
          <small>5512345678</small>
          <small>Comisión: 12.00%</small>
        </div>
        <div class="list-card-badges">
          <span class="pill pill-status pill-success is-active">Activo</span>
          <span class="pill pill-role-rp">RP</span>
        </div>
        <div class="list-card-actions">
          <button class="ghost-button">Editar</button>
          <button class="ghost-button">Desactivar</button>
          <button class="ghost-button ghost-danger">Eliminar</button>
        </div>
      </article>

      <!-- Admin inactivo -->
      <article class="collection-card list-card">
        <div class="list-card-info">
          <h3>Administración</h3>
          <p>@administrador</p>
          <small>0000000000</small>
        </div>
        <div class="list-card-badges">
          <span class="pill pill-status pill-danger">Inactivo</span>
          <span class="pill pill-role-admin">Admin</span>
        </div>
        <div class="list-card-actions">
          <button class="ghost-button">Editar</button>
          <button class="ghost-button">Activar</button>
          <button class="ghost-button ghost-danger">Eliminar</button>
        </div>
      </article>

      <!-- Manager activo -->
      <article class="collection-card list-card">
        <div class="list-card-info">
          <h3>Laura Gestora</h3>
          <p>@laura</p>
          <small>5598765432</small>
        </div>
        <div class="list-card-badges">
          <span class="pill pill-status pill-success is-active">Activo</span>
          <span class="pill pill-role-manager">Manager</span>
        </div>
        <div class="list-card-actions">
          <button class="ghost-button">Editar</button>
          <button class="ghost-button">Desactivar</button>
          <button class="ghost-button ghost-danger">Eliminar</button>
        </div>
      </article>
    </div>
  </div>
</body>
</html>
